name: Build MybknCore Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List repository files (debug)
        run: |
          echo "===== REPO ROOT ====="
          ls -la
          echo "===== ARANAN pom.xml DOSYASI ====="
          find . -name "pom.xml"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          POM_PATH=$(find . -name "pom.xml" | head -n 1)
          echo "Kullanilan pom.xml yolu: $POM_PATH"
          mvn -B clean package --file "$POM_PATH"

      - name: Find built jar (debug)
        run: find . -name "*.jar" -path "*/target/*"

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: MybknCore-jar
          path: |
            **/target/MybknCore.jar
